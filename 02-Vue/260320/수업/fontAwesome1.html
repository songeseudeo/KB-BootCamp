<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap + Font Awesome 앱 예제</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body {
      background-color: #f5f6f8;
    }

    .app-wrapper {
      max-width: 420px;
      margin: 30px auto;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      min-height: 800px;
    }

    .app-header {
      background: linear-gradient(135deg, #0d6efd, #3d8bfd);
      color: white;
      padding: 20px;
    }

    .profile-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .avatar i{
    font-size: 52px;
    }
    .quick-menu .card {
      border: 0;
      border-radius: 18px;
    }

    .menu-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .bottom-nav {
      border-top: 1px solid #e9ecef;
      background: #fff;
      position: sticky;
      bottom: 0;
    }

    .bottom-nav a {
      text-decoration: none;
      color: #6c757d;
      font-size: 13px;
    }

    .bottom-nav .active {
      color: #0d6efd;
      font-weight: 600;
    }

    .bottom-icon {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
    }
   
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- 1. 상단 앱바 -->
  <div class="app-header">
    <div class="profile-box">
      <div class="profile-info">
        <div class="avatar">
         <i class="fa-solid fa-circle-user"></i><!-- icon: user -->
        </div>
        <div>
          <div class="small">안녕하세요</div>
          <div class="fw-bold">홍길동 님</div>
        </div>
      </div>

      <button class="btn btn-light btn-sm rounded-circle">
        <i class="fa-solid fa-bell"></i> <!-- icon: bell-->
      </button>
    </div>

    <div class="mt-4">
      <div class="small opacity-75">이번 달 학습 현황</div>
      <h3 class="fw-bold mb-0">8 / 12 강의 완료</h3>
    </div>
  </div>

  <!-- 2. 빠른 메뉴 -->
  <div class="container py-4 quick-menu">
    <h5 class="fw-bold mb-3">빠른 메뉴</h5>

    <div class="row g-3">
      <div class="col-6">
        <div class="card shadow-sm p-3 h-100">
          <div class="menu-icon bg-primary-subtle text-primary">
            <i class="fa-solid fa-book"></i> <!-- icon: book  -->
          </div>
          <h6 class="mb-1">내 강의</h6>
          <p class="text-secondary small mb-0">수강 중인 강의 보기</p>
        </div>
      </div>

      <div class="col-6">
        <div class="card shadow-sm p-3 h-100">
          <div class="menu-icon bg-success-subtle text-success">
            <i class="fa-solid fa-calendar-check"></i> <!-- icon: calendar-check -->
          </div>
          <h6 class="mb-1">출석 체크</h6>
          <p class="text-secondary small mb-0">오늘 출석 확인하기</p>
        </div>
      </div>

      <div class="col-6">
        <div class="card shadow-sm p-3 h-100">
          <div class="menu-icon bg-warning-subtle text-warning">
            <i class="fa-solid fa-file-lines"></i> <!-- icon: file-lines  -->
          </div>
          <h6 class="mb-1">과제 제출</h6>
          <p class="text-secondary small mb-0">진행 중 과제 확인</p>
        </div>
      </div>

      <div class="col-6">
        <div class="card shadow-sm p-3 h-100">
          <div class="menu-icon bg-danger-subtle text-danger">
            <i class="fa-solid fa-gear"></i> <!-- icon: gear (검색: gear, settings) -->
          </div>
          <h6 class="mb-1">설정</h6>
          <p class="text-secondary small mb-0">앱 환경 설정</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 3. 최근 알림 -->
  <div class="container pb-4">
    <h5 class="fw-bold mb-3">최근 알림</h5>

    <div class="alert alert-primary d-flex align-items-center gap-2 rounded-4">
      <i class="fa-solid fa-circle-info"></i> <!-- icon: circle-info (검색: info, information) -->
      <div>오늘 과제 제출 마감입니다.</div>
    </div>

    <div class="alert alert-success d-flex align-items-center gap-2 rounded-4">
      <i class="fa-solid fa-circle-check"></i> <!-- icon: circle-check (검색: check, success) -->
      <div>출석 체크가 완료되었습니다.</div>
    </div>
  </div>

  <!-- 4. 하단 네비게이션 -->
  <div class="bottom-nav py-3">
    <div class="container">
      <div class="d-flex justify-content-around text-center">
        <a href="#" class="active">
          <i class="fa-solid fa-house bottom-icon"></i> <!-- icon: house (검색: home, house) -->
          홈
        </a>
        <a href="#">
          <i class="fa-solid fa-book-open bottom-icon"></i> <!-- icon: book-open (검색: book-open, lecture, study) -->
          강의
        </a>
        <a href="#">
          <i class="fa-solid fa-clipboard-list bottom-icon"></i> <!-- icon: clipboard-list (검색: clipboard, task, list) -->
          과제
        </a>
        <a href="#">
          <i class="fa-solid fa-user bottom-icon"></i> <!-- icon: user (검색: user, account) -->
          마이
        </a>
      </div>
    </div>
  </div>

</div>

</body>
</html>
