<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Vue3 v-bind 디렉티브 실습</title>
    <style>
        body {
            font-family: Arial;
            line-height: 1.8;
        }

        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 15px;
        }

        img {
            width: 150px;
            display: block;
            margin-top: 10px;
        }

        .active {
            color: white;
            background-color: teal;
            padding: 6px;
        }
    </style>
</head>

<body>

 <!--
==================================================
v-bind 디렉티브

v-bind는 HTML 속성과 Vue 데이터를 바인딩하는 디렉티브이다.

문법
1. v-bind:속성="표현식"
2. :속성="표현식"   ← 축약형

예시
v-bind:value="message"
:src="imagePath"


v-bind는 단방향 바인딩이다.
즉, 데이터 → 화면으로만 값이 전달된다.

사용자가 화면의 값을 변경해도
원본 데이터는 자동으로 변경되지 않는다.

입력 요소를 양방향으로 동기화하려면
v-model 또는 :value와 @input 이벤트를 함께 사용한다.

v-bind는 일반 HTML 속성뿐 아니라 class, style에도 사용할 수 있다.


공식문서
https://vuejs.org/guide/essentials/template-syntax.html#attribute-bindings
https://vuejs.org/api/built-in-directives.html#v-bind
==================================================
-->

    <div id="app">

        <h1>Vue3 v-bind 실습</h1>

   <!--
    v-bind의 핵심 특징

    1. HTML 속성과 데이터를 연결한다.
    2. 데이터가 바뀌면 화면(UI)이 갱신된다.
    3. 하지만 화면에서 값을 바꿔도 데이터가 자동 변경되지는 않는다.
       즉, 단방향 바인딩이다.
    -->

        <div class="box">
            <h3>1. 기본 속성 바인딩</h3>

        <!--
        input의 value 속성에 message 데이터를 연결
        -->
            <input type="text" v-bind:value="message">

            <p>message 값 : {{ message }}</p>
        </div>

        <div class="box">
            <h3>2. 이미지 경로 바인딩</h3>

       <!--
        src 속성에 imagePath 데이터를 연결
        -->
            <img v-bind:src="imagePath" alt="샘플 이미지">

            <p>imagePath 값 : {{ imagePath }}</p>
        </div>

        <div class="box">
            <h3>3. 축약 표현</h3>

        <!--
        v-bind:src 는 :src 로 줄여 쓸 수 있다.
        -->
            <img :src="imagePath" alt="샘플 이미지">
        </div>

        <div class="box">
            <h3>4. 단방향 바인딩 확인</h3>

            <input type="text" :value="message">

            <p>데이터 원본 : {{ message }}</p>
            <p>입력창의 값을 직접 바꿔도 위 데이터는 자동 변경되지 않는다.</p>
        </div>

        <div class="box">
            <h3>5. class 바인딩</h3>

       <!--
        v-bind는 class에도 사용할 수 있다.
        class와 style은 일반 속성과 달리
        Vue가 객체/배열 문법을 추가로 지원한다.
        -->
            <p :class="{ active: isActive }">class 바인딩 예제</p>

            <p>isActive 값 : {{ isActive }}</p>
        </div>

    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>

        const app = Vue.createApp({
            name: 'App',

            data() {
                return {
                    message: 'v-bind 디렉티브 예제',
                    imagePath: 'https://contactsvc.bmaster.kro.kr/photos/18.jpg',
                    isActive: true
                }
            }
        })

        app.mount('#app')
    </script>

</body>

</html>
