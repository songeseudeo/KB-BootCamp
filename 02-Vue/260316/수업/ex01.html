<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vue3 Intro</title>
</head>

<body>

<!-- Vue가 제어할 영역 (Root DOM) -->
<div id="app">
  <!-- Mustache Syntax : Vue 데이터 바인딩 -->
  <!-- message 값이 변경되면 화면도 자동으로 변경됨 -->
  <h2>{{ message }}</h2>
</div>

<!-- Vue3 CDN -->
<!-- 설치 없이 Vue 라이브러리를 바로 사용하는 방식 -->
<script src="https://unpkg.com/vue"></script>

<script>

/*
Model (데이터)
애플리케이션에서 사용할 데이터
*/
let model = {
  message: "Hello Vue3!"
};

/*
Vue.createApp()

Vue 애플리케이션을 생성하는 함수
옵션 객체(name, data 등)를 전달한다.

이 단계에서는 아직 DOM과 연결되지 않은 상태이다.
*/

let vm = Vue.createApp({

  name: "App",

  /*
  data()

  컴포넌트가 사용할 데이터를 정의하는 곳

  특징
  - 반드시 함수 형태로 작성
  - 객체를 반환
  - 반환된 객체는 Vue의 반응형 시스템에 등록됨

  Vue 내부에서는 이 객체를 Proxy로 감싸서
  데이터 변경을 감지할 수 있게 만든다.
  */

  data() {
    return model;
  }

})

/*
mount()

Vue 애플리케이션을 실제 HTML DOM에 연결하는 함수

mount('#app') 실행 시

1. 컴포넌트 인스턴스 생성
2. data() 실행
3. 반환된 객체가 Proxy로 감싸짐 (reactive 객체)
4. Vue가 DOM을 렌더링
5. 데이터와 화면이 연결됨


뷰동작----------
데이터 변경
↓
Proxy 감지
↓
다시 렌더링
↓
DOM 업데이트
*/

.mount('#app');


</script>

</body>
</html>
