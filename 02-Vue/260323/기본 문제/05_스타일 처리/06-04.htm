<div id="app">
    <button :style="[myColor, myLayout]">테스트</button>
</div>

<script src="https://unpkg.com/vue"></script>
<script>
let vm = Vue.createApp({
    name: "app",
    data() {
        return {
            myColor: {
                backgroundColor : "purple",
                color : "yellow",
            },
            myLayout: {
                width: '150px',
                heigth: '80px',
                textAlign: 'center',
            }
        }
    }
}).mount("#app")
</script>
