<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .buttonColor {
            background-color: aqua;
            color: black;
        }

        .buttonLayout {
            text-align: center;
            width: 120px;
        }

        .staticBorder {
            border: khaki dashed 1px;
        }
    </style>
</head>

<body>
    <div id="app">
        <input type="checkbox" v-model="isMyLayout" />
        레이아웃 적용 여부<br />
        //css를 적용할 때는 :class로 적용할 수 있다. 배열로 여러개도 가능하다.
        //css는 staticBorder로 고정, buttonColor는 myColor로 지정, buttonLayout은 isMyLayout이 true일 때만 적용하도록 지정
        <button class="staticBorder" :class="[myColor, isMyLayout? myLayout:'']">버튼</button>
    </div>
    <script src="https://unpkg.com/vue"></script>
    <script>
        let vm = Vue.createApp( {
            name: 'App',
            data () {
                return {
                    //css를 변경하고 싶으면 속성명으로 지정
                    myColor: 'buttonColor',
                    myLayout: 'buttonLayout',
                    isMyLayout: false,
                };
            },
        } ).mount( '#app' );
    </script>
</body>

</html>
