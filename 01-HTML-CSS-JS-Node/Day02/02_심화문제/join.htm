<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>회원가입</legend>
        </fieldset>
        <table>
            <tr>
                <th>사용자 ID</th>
                <td input typr = "text" name = "username"></td>
            </tr>
            <tr>
                <th>비밀번호</th>
                <td input type = "text" name = "password"></td>
            </tr>
            <tr>
                <th>비밀번호 확인</th>
                <td input type = "text" name = "password2"></td>
            </tr>
            <tr>
                <th>이름</th>
                <td input type = "text" name = "name"></td>
            </tr>
            <tr>
                <th>성별</th>
                <td>
                    <input type = "radio" name = "gener" value = "man"/> 남
                    <input type = "radio" name = "gener" value = "woman"/> 여
                </td>
            </tr>
            <tr>
                <th>취미</th>
                <td> 
                    <input type = "checkbox" name = "hobby" value = "soccer"/> 축구
                    <input type = "checkbox" name = "hobby" value = "baseball"/> 야구
                    <input type = "checkbox" name = "hobby" value = "volleyboall"/> 배구
                    <input type = "checkbox" name = "hobby" value = "baskeball"/> 농구
                </td>
            </tr>
            <tr>
                <th>email</th>
                <td input type = "text" name = ""></td>
            </tr>
        </table>
    </form>
</body>
</html>
