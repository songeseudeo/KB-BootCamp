<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript 함수 실습</title>
</head>

<body>

<h1>JavaScript 함수(Function) 실습</h1>
<p>F12 → Console에서 결과 확인</p>

<script>

/*
================================
함수(Function)
================================

함수는 특정 작업을 수행하는 코드의 묶음이다.

같은 코드를 여러 번 사용할 때
함수로 만들어 재사용할 수 있다.


출처 (MDN)
https://developer.mozilla.org/ko/docs/Web/JavaScript/Guide/Functions
*/


/*
================================
1. 선언적 함수 (Function Declaration)
================================

function 키워드로
이름 있는 함수를 선언하는 방식

문법

function 함수이름() {
    실행문
}

출처
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/function
*/



function hello() {
    console.log("안녕하세요");
}

hello(); // 함수 호출



/*
================================
2. 매개변수 (Parameter) / 인수 (Argument)
================================

매개변수(parameter)
→ 함수 정의 시 받는 변수

인수(argument)
→ 함수 호출 시 전달하는 값
*/

function greet(name) { // name은 매개변수
    console.log("안녕하세요 " + name);
}

greet("홍길동");   // "홍길동"은 인수
greet("제니");



/*
================================
3. 반환값 (return)
================================

함수 실행 결과를 반환할 때
return을 사용한다.

1. 함수 실행을 종료한다.
2. 호출한 위치로 값을 반환한다.

즉

함수 → 실행
return → 호출한 곳으로 돌아감
*/



// return 있는 경우
function add(a, b) {
    return a + b;
}

let result = add(10, 20);
console.log("합:", result);



// return 없는 경우

function printMessage(){
    console.log("메시지 출력");
    //return undefined;  return이 없지만 실제로는 내부적으로 return undefined;  가 실행됨 , 나를 호출한 곳으로 돌아감
  //  https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/return
}

let result2 = printMessage();

console.log(result2); //undefined


/*
================================
4. 익명 함수 (Anonymous Function)
================================

이름이 없는 함수

보통 변수에 저장해서 사용한다.

출처
https://developer.mozilla.org/ko/docs/Glossary/Anonymous_function
*/

let sayHello = function() {
    console.log("익명 함수 실행");
};

sayHello();



/*
================================
5. 함수 표현식 (Function Expression)
================================

함수를 변수에 저장하는 방식

변수 = function() { }
*/

let divide = function(a, b) {
    return a / b;
};

console.log("나눗셈:", divide(10, 2));



/*
================================
6. 콜백 함수와 고차 함수
================================

콜백 함수(Callback Function)란?

→ 다른 함수의 매개변수로 전달되어
나중에 실행되는 함수이다.

고차 함수(Higher-order Function)란?

→ 함수를 매개변수로 받거나
→ 함수를 반환하는 함수이다.

즉
함수를 전달받아서 사용하는 함수는 고차 함수이고,
그 고차 함수에 전달되는 함수는 콜백 함수이다.

참고 (MDN)
콜백 함수
https://developer.mozilla.org/ko/docs/Glossary/Callback_function

고차 함수
https://developer.mozilla.org/en-US/docs/Glossary/Higher-order_function
*/


/*
--------------------------------
1. 기본 콜백 함수 예제
--------------------------------

processUser는 함수를 매개변수로 받으므로
고차 함수이다.

전달되는 함수는
콜백 함수이다.
*/

function processUser(callback) {

    console.log("사용자 처리 시작");

    callback(); // 전달받은 콜백 함수 실행
}

processUser(function () {
    console.log("콜백 함수 실행");
});



//-----------------------------------------------
// 전달 받은 값을 증가 시켜주는 함수 - 콜백함수로 사용
function increase (value) {
    return value + 1;
}

// 전달 받은 값을 감소 시켜주는 함수 - 콜백함수로 사용
function decrease (value) {
    return value - 1;
}

//전달받은 함수에 전달받은 값을 적용시켜주는 고차함수 
function apply(func, value) {
    
    return func(value)
}

// 고차함수로 콜백함수를 전달하면서 호출
console.log(apply(increase,  5))
console.log(apply(decrease,  5))


/*
--------------------------------
정리
--------------------------------

고차 함수
→ 함수를 전달받아 사용하는 함수

콜백 함수
→ 고차 함수에 전달되어 나중에 실행되는 함수
*/


/*
--------------------------------------------------
 forEach
--------------------------------------------------

배열 또느 NodeList 의 요소를 하나씩 꺼내서 실행하는 함수

특징
- 배열을 순회할 때 많이 사용
- 코드가 간단함
- break 사용 불가
- 새로운 배열을 만들지 않음 (반환값 없음)
- 단순출력용

*/

const fruits2 = ["사과", "바나나", "포도"];

fruits2.forEach(function(fruit) {
  console.log(fruit);
});



/*
--------------------------------------------------
 map
--------------------------------------------------

배열의 값을 변환해서 "새 배열을 만드는 함수"

특징
- 원본 배열은 유지
- 새로운 배열 반환
- 데이터 가공할 때 사용

예
1 → 2
2 → 4
3 → 6


*/

const numbers = [1, 2, 3];

const result3 = numbers.map(function(num) {
  return num * 2;
});

console.log(result3)


/*
--------------------------------------------------
 filter
--------------------------------------------------

배열에서 "조건에 맞는 값만 골라서"
새로운 배열을 만드는 함수

특징
- 조건에 맞는 데이터만 선택
- 원본 배열은 변경되지 않음
- 새로운 배열을 반환
- 데이터 검색 / 필터링에 많이 사용

동작 방식
배열을 하나씩 검사하면서
조건이 true인 값만 새 배열에 넣음
*/


const numbers5 = [1, 2, 3, 4, 5];

/*
조건 : 3보다 큰 숫자만 선택
*/

const result5 = numbers.filter(function(num){
  return num > 3;
});

console.log(result5);


/*
실행 과정

1 검사 → 1 > 3 → false → 제외
2 검사 → 2 > 3 → false → 제외
3 검사 → 3 > 3 → false → 제외
4 검사 → 4 > 3 → true → 포함
5 검사 → 5 > 3 → true → 포함

결과
[4, 5]
*/


/*
================================
7. 지역 변수 (Local Variable)
================================

함수 내부에서 선언한 변수

함수 내부에서만 사용 가능
*/

function testLocal(){

    let num = 10;

    console.log("지역 변수:", num);

}

testLocal();

// console.log(num) 오류 발생



/*
================================
8. 전역 변수 (Global Variable)
================================

함수 밖에서 선언한 변수

프로그램 어디서든 접근 가능
*/

let globalValue = 100;

function checkGlobal(){
    console.log("전역 변수:", globalValue);
}

checkGlobal();
// 밖에서 쓸 거면 밖에다가 정의해 줘야함.
console.log("전역 변수:", globalValue);


/*
================================
9. 함수 정리
================================

함수
→ 코드 묶음

함수 선언 방식

1. 선언적 함수 (Function Declaration)
→ function 키워드로 이름 있는 함수를 선언 
→ 이름으로 바로 호출

예
function hello(){
    console.log("hello");
}

2. 함수 표현식 (Function Expression)
→ 함수를 변수에 저장
→ 변수로 호출

예
let hello = function(){
    console.log("hello");
}

매개변수 (Parameter)
→ 함수 정의할 때 받는 변수

인수 (Argument)
→ 함수 호출할 때 전달하는 실제 값

return
→ 결과 반환

익명 함수
→ 이름 없는 함수

콜백 함수
→ 다른 함수의 인수로 전달되는 함수
*/

</script>

</body>
</html>
