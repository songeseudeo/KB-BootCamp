<script>

/***************************************************************************
 JavaScript Hoisting (호이스팅)

 호이스팅이란?
 -------------------------------------------------------
 변수(var) 선언문이나 함수 선언문이
 해당 스코프의 최상단으로 끌어올려진 것처럼
 동작하는 자바스크립트의 특징을 말한다.

 즉 코드에서 선언이 아래에 있어도
 자바스크립트 엔진은 실행 전에 선언을 먼저 처리한다.

 ※ 실제 코드가 이동하는 것은 아니고
 엔진이 실행 전에 선언을 먼저 처리하기 때문에
 마치 위로 올라간 것처럼 보이는 것이다.

 공식문서
 https://developer.mozilla.org/ko/docs/Glossary/Hoisting
***************************************************************************/



/***************************************************************************
 자바스크립트 코드 실행 과정
 -------------------------------------------------------

 1단계 : 실행 전에 선언문을 먼저 찾는다
         (변수 선언, 함수 선언)

 2단계 : 선언을 먼저 처리한다

 3단계 : 코드를 위에서 아래로 실행한다

 이 과정 때문에 선언이 아래 있어도
 먼저 사용이 가능한 현상이 발생한다.
***************************************************************************/


/***************************************************************************
 변수 호이스팅 (var)
 -------------------------------------------------------

 var 키워드는 선언과 동시에 undefined로 초기화 된다.

***************************************************************************/



console.log(a);
var a = 10;


// 실제로 아래처럼 동작
// var a;

// console.log(a); // undefined

// a = 10;


/***************************************************************************
 let / const 호이스팅
 -------------------------------------------------------

 let과 const도 실제로는 호이스팅이 발생한다.

 하지만 var와 차이점이 있다.


 var
 ---------------------
 선언 + 초기화 동시에 진행
 초기값 = undefined


 let / const
 ---------------------
 선언과 초기화가 분리됨

 선언은 먼저 되지만
 초기화가 되기 전에 접근하면 에러 발생

***************************************************************************/


// console.log(x); //Uncaught ReferenceError: Cannot access 'x' before initialization
// // ReferenceError 발생

let x = 5;



// 실제로 아래처럼 동작
// x는 내부적으로 선언되지만 아직 초기화되지 않음 
// console.log(x);  그래서 에러발생 ReferenceError
// let x = 5;





/***************************************************************************
 함수 호이스팅
 -------------------------------------------------------

 함수 선언문(function declaration)은
 호이스팅이 발생한다.

 따라서 함수가 아래에 있어도
 위에서 호출할 수 있다.

 함수 선언문
 function hello(){}

 특징
 - 호이스팅 발생
 - 선언 전에 호출 가능

***************************************************************************/


// 함수 선언 전에 호출
console.log(hello("홍길동"));


function hello(name){
    return name + "님 안녕하세요";
}

/*
 실제로는 아래 처럼  먼저 만들어진 것처럼 동작한다.

 function hello(name){
     return name + "님 안녕하세요";
 }

 console.log(hello("홍길동"));
*/


/***************************************************************************
 함수 표현식
 -------------------------------------------------------

 var hello = function(){}

 특징
 - 변수에 함수가 저장되는 방식
 - 변수만 호이스팅 된다
 - 함수는 할당 이후에 사용 가능
***************************************************************************/



// 함수 표현식
console.log(test2); // 변수가 undefined로 초기화 

// console.log(test2()); 
// TypeError 발생 (아직 함수가 아님)

var test2 = function(){
    return "함수 표현식";
};






/***************************************************************************
 정리
 -------------------------------------------------------

 호이스팅 핵심 정리

 1. 함수 선언문은 호이스팅 된다.
    → 선언 전에 호출 가능

 2. var 변수는 호이스팅 된다.
    → 초기값 undefined

 3. 함수 표현식은 호이스팅되지 않는다.

 4. let / const 는
    초기화 전에 접근하면 에러 발생


 권장 방식
 -------------------------------------------------------
 ES6 이후에는 var 대신

 let
 const

 사용 권장


 공식문서 참고
 -------------------------------------------------------
 MDN Hoisting
 https://developer.mozilla.org/ko/docs/Glossary/Hoisting


***************************************************************************/


</script>
