<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 개발자가 선언한 함수 (사용자 정의 함수, user-defined)
        function rec() {
        
            //1. 입력(데이터 가지고 오기)
            // 가로 값 가지고 오기
            //input 태그에서 value 속성 값만 가지오 와라
            let n1 = document.getElementById('n1').value; //100
            // 세로 값 가지고 오기
            let n2 = document.getElementById('n2').value; //200
            //2. 처리
            // 면적 계산하기
            //js코드에서 직접 변수에 값을 넣을 때는 문자/숫자를 구분해서 넣을 수 있음.
            //하지만 브라우저에서 가져올 때는 내 의도를 모를 수 있음.
            //브라우저의 input에서 입력한 value값은 모두 문자로 인식함.
            //문자로 처리할지, 숫자로 처리할지는 프로그래머가 결정함.
            let n11 = parseInt(n1);
            let n22 = parseInt(n2);
            let result = n11 * n22;
            //3. 출력
            alert('사격형의 면적 결과: ' + result);
        }
    </script>
</head>
<body>
    <!-- 고정된 값을 추가하고 싶으면 -> value="100" -->
    <span style="color: blue;">가로</span>: <input type="text" id="n1" /><br />
    세로: <input type="text" id="n2" /><br />
    <!-- 이미 브라우저에 들어있는 함수 (내장된 함수, built-in) -->
    <button style="background: yellow; color: red" 
    onclick="rec()">사각형의 면적 구하기</button>

    <!-- <button style="background: yellow; color: red" 
    onclick="alert('버튼 클릭함')">사각형의 면적 구하기</button> -->
</body>
</html>
