<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_dom_basic</title>

    <style>
        body {
            font-family: "맑은 고딕", sans-serif;
            line-height: 1.8;
            padding: 20px;
        }

        h1 {
            color: darkblue;
        }

        .box {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        button {
            padding: 8px 14px;
            margin-right: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            padding: 12px;
            background-color: #f5f5f5;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!--
        =========================================================
        [BOM과 DOM의 관계]
        ---------------------------------------------------------
        window (BOM)
            ├ document (DOM)
            │   └ HTML 요소들
            ├ location
            ├ history
            ├ navigator
            └ screen

        BOM(Browser Object Model)
        - 브라우저 자체를 객체로 다루는 개념

        DOM(Document Object Model)
        - HTML 문서를 객체 구조로 다루는 개념

        MDN 참고
        - Window:
          https://developer.mozilla.org/en-US/docs/Web/API/Window
        - Document:
          https://developer.mozilla.org/en-US/docs/Web/API/Document
        =========================================================
    -->

    <!--
        =========================================================
        [DOM 기본 개념]
        ---------------------------------------------------------
        정적 생성
        - HTML 문서를 파싱할 때 HTML 태그로부터 DOM 요소가 생성되는 것

        동적 생성
        - 자바스크립트를 이용해 실행 중에 DOM 요소를 생성하는 것

        쉽게 말하면
        - HTML을 자바스크립트가 읽고, 선택하고, 바꿀 수 있게 만든 것

        MDN 참고
        - DOM 개요:
          https://developer.mozilla.org/en-US/docs/Web/API/Document_Object_Model
        =========================================================
    -->

    <h1 id="title">DOM 기본 개념 실습</h1>

    <p>
        이 파일은 DOM의 가장 기초 개념을 배우기 위한 실습 파일입니다.
    </p>

    <div class="box">
        <h2>핵심 개념 정리</h2>
        <ul>
            <li>DOM = HTML 문서를 객체처럼 다루는 구조</li>
            <li>document = 현재 HTML 문서 전체</li>
            <li>window = 브라우저 창 전체</li>
            <li>요소 노드 = 태그 자체</li>
            <li>텍스트 노드 = 태그 안의 글자</li>
            <li>정적 생성 = HTML 작성 후 브라우저가 DOM 생성</li>
            <li>동적 생성 = JavaScript로 실행 중 DOM 생성</li>
        </ul>
    </div>

    <div class="box">
        <h2>실습 버튼</h2>
        <button id="btn1">제목 바꾸기 + 문장 추가</button>
        <button id="btn2">설명 넣기</button>
    </div>

    <div id="result">여기에 결과가 표시됩니다.</div>

    <!--
        =========================================================
        [script 위치 문제]
        ---------------------------------------------------------
        자바스크립트는 HTML 요소가 먼저 만들어진 뒤에 실행하는 것이 좋다.

        만약 script가 너무 위에서 먼저 실행되면,
        아직 h1, button, div가 만들어지지 않았을 수 있다.

        그러면 선택 결과가 null이 될 수 있다.

        준비 방법
        1. script를 body 맨 아래에 두기
        2. DOMContentLoaded 사용
        3. 필요 시 window load 사용

        MDN 참고
        - DOMContentLoaded:
          https://developer.mozilla.org/en-US/docs/Web/API/Document/DOMContentLoaded_event
        - Window load:
          https://developer.mozilla.org/en-US/docs/Web/API/Window/load_event
        =========================================================
    -->

    <script>
        /*
            =====================================================
            [document와 window]
            -----------------------------------------------------
            document
            - 현재 웹 문서 전체를 의미
            - 태그를 선택할 때 사용

            window
            - 브라우저 창 전체를 의미
            - alert, setTimeout, location, history 등이 포함됨

            MDN 참고
            - Document:
              https://developer.mozilla.org/en-US/docs/Web/API/Document
            - Window:
              https://developer.mozilla.org/en-US/docs/Web/API/Window
            =====================================================
        */
        console.log("document 객체 확인:", document);
        console.log("window 객체 확인:", window);

        /*
            =====================================================
            [요소 노드와 텍스트 노드]
            -----------------------------------------------------
            <h1 id="title">DOM 기본 개념 실습</h1>

            - h1 태그 자체 = 요소 노드(Element Node)
            - DOM 기본 개념 실습 = 텍스트 노드(Text Node)
            =====================================================
        */

        /*
            =====================================================
            [DOM 선택]
            -----------------------------------------------------
            document.getElementById("id값")
            - id를 이용해서 요소 1개를 선택하는 방법

            MDN 참고
            - getElementById:
              https://developer.mozilla.org/en-US/docs/Web/API/Document/getElementById
            =====================================================
        */
        const title = document.getElementById("title");
        const btn1 = document.getElementById("btn1");
        const btn2 = document.getElementById("btn2");
        const result = document.getElementById("result");

        /*
            =====================================================
            [실습 1]
            -----------------------------------------------------
    
            textContent
            - 글자만 넣기

            createElement()
            - 새로운 요소를 생성

            appendChild()
            - 생성한 요소를 문서에 붙이기

            즉, 이 실습은
            - 기존 요소 내용 변경
            - 동적 생성
            을 함께 보여준다.

            MDN 참고
            - textContent:
              https://developer.mozilla.org/en-US/docs/Web/API/Node/textContent
            - createElement:
              https://developer.mozilla.org/en-US/docs/Web/API/Document/createElement
            - appendChild:
              https://developer.mozilla.org/en-US/docs/Web/API/Node/appendChild
            =====================================================
        */
        btn1.addEventListener("click", function () {
            title.textContent = "제목이 자바스크립트로 변경되었습니다.";

            const p = document.createElement("p");
            p.textContent = "이 문장은 자바스크립트로 실행 중에 추가된 문장입니다.";
            document.body.appendChild(p);
        });

        /*
            =====================================================
            [실습 2]
            -----------------------------------------------------

            innerHTML
            - HTML 태그를 포함해서 내용 넣기 가능

            MDN 참고
            - innerHTML:
              https://developer.mozilla.org/en-US/docs/Web/API/Element/innerHTML
            =====================================================
        */
        btn2.addEventListener("click", function () {
            result.innerHTML =
                "<b>DOM</b>은 HTML 문서를 자바스크립트에서 다룰 수 있도록 만든 객체 구조입니다.";
        });

        /*
            =====================================================
            [DOMContentLoaded]
            -----------------------------------------------------
            HTML 문서가 완전히 파싱되고
            DOM 구조가 준비되면 실행된다.

            이 이벤트는 이미지, iframe, async script 등의
            로딩 완료까지는 기다리지 않는다.


            MDN 참고
            - DOMContentLoaded:
              https://developer.mozilla.org/en-US/docs/Web/API/Document/DOMContentLoaded_event
            =====================================================
        */
        document.addEventListener("DOMContentLoaded", function () {
            console.log("DOMContentLoaded 실행");
            console.log("HTML 파싱 완료, DOM 구조 준비 완료");
        });

        /*
            =====================================================
            [window load]
            -----------------------------------------------------
            페이지 전체와 의존 리소스가 모두 로드된 뒤 실행된다.

            예)
            - 이미지
            - 스타일시트
            - 스크립트
            - iframe

            따라서 DOM만 빨리 사용하고 싶을 때는
            DOMContentLoaded보다 늦을 수 있다.

            MDN 참고
            - Window load:
              https://developer.mozilla.org/en-US/docs/Web/API/Window/load_event
            =====================================================
        */
       
        window.addEventListener("load", function () {
            console.log("window load 이벤트 실행");
            console.log("페이지와 리소스 로딩 완료");
        });

        /*
            =====================================================
            [파싱이란?]
            -----------------------------------------------------
            파싱(parsing)
            - 데이터를 읽어서 문법을 분석하고
              구조화된 형태로 만드는 과정

            웹에서는
            - HTML 문자열을 읽고
            - 태그 구조를 해석해서
            - DOM을 만드는 과정이라고 이해하면 된다.

            MDN 참고
            - DOMContentLoaded 설명:
              https://developer.mozilla.org/en-US/docs/Web/API/Document/DOMContentLoaded_event
            =====================================================
        */

        /*
            =====================================================
            [정리]
            -----------------------------------------------------
            1. DOM은 HTML을 자바스크립트가 다룰 수 있게 만든 구조
            2. document는 현재 문서 전체
            3. window는 브라우저 창 전체
            4. 태그를 선택한 뒤 내용을 바꿀 수 있다.
            5. JavaScript로 새로운 요소를 만들어 추가할 수 있다.
            6. 표준 이벤트 방식은 addEventListener() 이다.
            7. DOM 조작은 문서가 준비된 뒤 실행해야 한다.

            동작 순서
            1 HTML 다운로드
            2 HTML 파싱
            3 DOM 생성
            4 DOMContentLoaded 발생
            5 이미지 / CSS / 폰트 등 계속 로딩
            6 모든 리소스 완료
            7 window load 발생
            =====================================================
        */
    </script>
</body>
</html>

<!-- defer -->
<!-- HTML 파싱을 막지 않고 script 다운로드 -->
<!-- HTML 파싱이 끝난 후 실행 -->
<!-- 여러 개 있을 경우 작성된 순서대로 실행 -->
<!-- DOM이 모두 만들어진 뒤 실행되므로 DOM 조작 코드에 안전 -->
<!-- 외부 script에서만 사용 가능 -->
<!-- MDN: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/script#defer -->

<!-- async -->
<!-- HTML 파싱을 막지 않고 script 다운로드 -->
<!-- 다운로드가 끝나면 즉시 실행 -->
<!-- HTML 파싱이 일시적으로 멈출 수 있음 -->
<!-- 여러 개 있을 경우 실행 순서 보장 안됨 -->
<!-- 독립적인 script(광고, 분석 스크립트 등)에 사용 -->
<!-- MDN: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/script#async -->
