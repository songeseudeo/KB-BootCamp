<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #total {
            background: skyblue;
            width: 800px;
            height: 800px;
        }
        #top {
            /* --설명 */
            background: lime;
            width: 800px;
            height: 100px;
            padding: 2px;
        }
        #center {
            padding: 30px;
            width: 800px;
            height: 500px;
            vertical-align: middle;
        }
        #top2 {
            /* --장바구니 */
            background: black;
            color: yellow;
            position: fixed;
            top: 5px;
            right: 5px;
            width: 250px;
            height: 100px;
            border-radius: 100px 10px;
        }
        li {
            list-style: none;
            float: left;
            padding: 15px;
            text-align: center;
        }
        li:nth-child(2n) {
            background: orange;
        }
        li:nth-child(2n + 1) {
            background: yellow;
        }
    </style>
</head>
<body>
    <div id="total">
        <div id="top">
            <ul>
                <li>회원가입</li>
                <li>제품정보</li>
                <li>게시판</li>
                <li>장바구니</li>
            </ul>
        </div>
        <div id="top2">장바구니</div>
        <div id="center">테이블</div>
    </div>
</body>
</html>
