<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body{
            font-family:Arial, sans-serif;
            line-height:1.6;
        }

        .container {
            width: 90%;
            margin: 0 auto;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #555;
        }

        nav ul {
            list-style: none;
            /* 옆으로 쭉 나옴 */
            display: flex;
            justify-content: center;
        }

        nav li {
            margin: 0 15px;
        }
        nav a {
            text-decoration: none;
            color: white;
            padding: 15px 0;
            display: block;
        }

        .main {
            display: flex;
            margin: 20px 0;
        }

        aside {
            flex : 1;
            background: yellow;
            padding: 20px;
        }

        section {
            flex : 3;
            background: pink;
            padding: 20px;
        }

            .card-wrap{
            display:flex;
            /*   요소사이의 간격  부모가 설정 */
            gap:20px;
            margin-top:20px;
        }
        .card{
            /* 각 카드가 동일한 비율로 남는 공간을 나누겠다 */
            flex:1; 
            background:white;
            border:1px solid #ccc;
            padding:20px;
            text-align:center;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .top-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            background: #333;
            color: white;
            border: none;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 5px;
        }

           /*
        =================================
        태블릿 이하
        =================================
        화면이 767px 이하가 되면
        가로 배치를 세로 배치로 변경
        */
        @media screen and (max-width:767px){

            nav ul{
                flex-direction:column;
                text-align:center;
            }

            .main{
                flex-direction:column;
            }

            .card-wrap{
                flex-direction:column;
            }
        }

        /*
        ================================
        flex-direction
        ================================

        Flex 아이템을 배치하는 방향을 결정한다.
        부모 요소(Flex Container)에 적용
        row
        → 가로 방향 배치 (기본값)

        column
        → 세로 방향 배치

        row-reverse
        → 가로 역순

        column-reverse
        → 세로 역순
        */
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>반응형 웹 실습</h1>
            <p>화면 크기에 따라 레이아웃이 바뀝니다.</p>
        </div>
    </header>

    <nav>
        <div class="container">
            <ul>
                <li><a href="#">홈</a></li>
                <li><a href="#">소개</a></li>
                <li><a href="#">서비스</a></li>
                <li><a href="#">문의</a></li>
            </ul>
        </div>
    </nav>

     <div class="container">
        <div class="main">

            <aside>
                <h2>사이드바</h2>
                <p>공지사항</p>
                <p>배너</p>
                <p>카테고리 메뉴</p>
            </aside>

            <section>
                <h2>본문 내용</h2>
                <p>
                    이 영역은 본문입니다.
                    화면이 넓을 때는 사이드바와 나란히 보이고,
                    화면이 좁아지면 아래로 내려옵니다.
                </p>

                <div class="card-wrap">
                    <div class="card">카드 1</div>
                    <div class="card">카드 2</div>
                    <div class="card">카드 3</div>
                </div>
            </section>

        </div>
        <!-- href -->
         <a href="#" class="top-btn">TOP</a>
    </div>
    <footer>
        <p>푸터 영역</p>
    </footer>
</body>
</html>
