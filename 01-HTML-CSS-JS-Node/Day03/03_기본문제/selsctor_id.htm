<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* width = 가로너비 */
        /* 이건 id이다. 라고 하려면 #을 써야함 */
        #box1 {
            width: 800px;
        }
        #a {
            width: 800px;
            background: red;
        }
        #b {
            width: 200px;
            background: blue;
            float: left;
        }
        #c {
            width: 600px;
            background: green;
            float: left;
        }
    </style>
</head>
<!-- 아이디를 div 하고 줘야지!! -->
<body>
    <div id="a">
        <h1>
            #header 태그
        </h1>
    </div>
    <div id="box1">
            <div id="b">
                <h1>
                    #aside 태그
                </h1>
            </div>
            <div id="c">
                <h1>
                    #content 태그
                </h1>
            </div>
        </div>
</body>
</html>
