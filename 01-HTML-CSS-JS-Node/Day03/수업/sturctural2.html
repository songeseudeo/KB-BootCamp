    <style>
        li {

            list-style: none;
            float: left;

            padding: 15px;
            width: 70px;
            height: 20px;
            background: orange;
            border-radius: 50px;
            text-align: center;

        }

/* 첫 번째 li 선택 */
        /* li:first-child {

/* 마지막 li 선택 */

            background: red;
        } */


/* 짝수 번째 li 선택 (2,4,6,...) */

        li:nth-child(2n){
            background: yellow;
        }
/* 홀수 번째 li 선택 (1,3,5,...) */
        li:nth-child(2n-1){
            background: red;
        }


        a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

    </style>
