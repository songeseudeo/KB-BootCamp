<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>속성 선택자 실습</title>

    <style>
        /* 

        [attr=value]   : 정확히 일치
        [attr^=value]  : value로 시작
        [attr$=value]  : value로 끝
        [attr*=value]  : value 포함

        */

        /* type 속성이 text인 input */
        input[type="text"] {
            background-color: lightblue;
        }

        /* type 속성이 password인 input */
        input[type="password"] {
            background-color: lightpink;
        }

        /* src 속성이 png 로 끝나는 이미지 */
        img[src$="png"] {
            border: 5px solid red;
        }

        /* src 속성이 jpeg 로 끝나는 이미지 */
        img[src$="jpg"] {
            border: 5px dashed blue;
        }

        /* class 속성에 box 가 포함된 div */
        div[class*="box"] {
            background-color: yellow;
        }

           /* class 속성에 box 로시작하는 div */
        div[class^="box"] {
            background-color: blue;
        }
    </style>

</head>

<body>

    <h3>속성 선택자 실습</h3>

    아이디 : <input type="text"><br><br>
    비밀번호 : <input type="password"><br><br>

    <hr>

    
    <img src="img/Desert.jpg" width="120">
    <img src="img/BackgroundBack.png" width="120">

    <hr>

   
    <div class="box">box</div>
    <div class="red-box">red-box</div>
    <div class="container">container</div>

</body>

</html>
