<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>CSS 박스 속성 실습</title>

    <style>
        /*
            ================================
            CSS 박스 모델 (Box Model)
            ================================

            HTML 요소는 모두 "상자(Box)" 형태이다.

            안 → 밖 순서

            1 content  : 실제 내용 영역
            2 padding  : 내용과 테두리 사이 여백 (안쪽 여백)
            3 border   : 테두리
            4 margin   : 다른 요소와의 간격 (바깥 여백)

            정리
            content → padding → border → margin


            ================================
            margin / padding 작성 방법
            ================================

            1개 값
            margin:20px;
            → 모든 방향

            2개 값
            margin:10px 20px;
            → 위아래 10px
            → 좌우 20px

            4개 값
            margin:10px 20px 30px 40px;
            → 위 오른쪽 아래 왼쪽


            ================================
            box-sizing
            ================================

            content-box (기본값)
            width / height = content 기준 : padding / border는 width에 포함되지않아서 그 크기 만큼 더해짐 

            border-box
            width / height = padding + border 포함 :  그래서 설정값 그대로 유지 


            ================================
            레이아웃 나누기
            ================================

            상하 나누기
            height %

            좌우 나누기
            float + width %

            */


        body {
            font-family: Arial;
        }


        /* 기본 박스 */

        .box {
            width: 200px;
            height: 100px;
            background-color: skyblue;

            border: 5px solid blue;

            padding: 20px;

            margin: 20px;
        }



        /* margin / padding 실습 */

        .test {
            width: 150px;
            height: 80px;
            background: red;

            /* 위아래 10px / 좌우 30px */
            margin: 10px 30px;

            /* 위 오른쪽 아래 왼쪽 */
            padding: 10px 20px 10px 20px;
        }



        /* 레이아웃 영역 */

        .wrap {
            width: 600px;
            /* 전체 박스 가로 크기 */
            height: 200px;
            /* 전체 박스 세로 크기 */
            border: 3px solid black;
            margin-top: 40px;
            /* 위쪽 여백 */
        }


        /* ===============================
        상하(div 위/아래)로 나누기
        =============================== */

        .top,
        .bottom {
            border: 5px solid blue;

            width: 100%;
            /* 부모(.wrap) 가로 크기만큼 사용 */

            box-sizing: content-box;
            /*
                content-box (기본값)

                width는 content 크기만 계산한다.

                그래서 실제 크기
                content + border + padding

                border 때문에 박스가 부모보다
                약간 튀어나올 수 있음
                */
        }

        .top {
            height: 70%;
            /* 부모 높이의 70% */
        }

        .bottom {
            height: 30%;
            /* 부모 높이의 30% */
        }



        /* ===============================
            좌우(div 왼쪽/오른쪽)로 나누기
            =============================== */

        .left,
        .right {
            border: 5px solid green;

            height: 100%;
            /* 부모 높이만큼 사용 */

            box-sizing: border-box;
            /*
            border-box

            width 안에 border 포함

            그래서 width:70%, 30% 사용해도
            레이아웃이 깨지지 않음
            */

            float: left;
            /* 왼쪽으로 붙여서 가로 정렬 */
        }

        .left {
            width: 70%;
            /* 전체 가로의 70% */
        }

        .right {
            width: 30%;
            /* 전체 가로의 30% */
        }
    </style>
</head>

<body>

    <h1>CSS 박스 속성 실습</h1>

    <h2>1 박스 모델 확인</h2>

    <div class="box">
        content 영역<br>
        padding 적용<br>
        margin 적용
    </div>


    <h2>2 margin / padding 실습</h2>

    <div class="test"></div>


    <h2>3 div 상하 나누기</h2>

    <div class="wrap">
        <div class="top"></div>
        <div class="bottom"></div>
    </div>


    <h2>4 div 좌우 나누기</h2>

    <div class="wrap">
        <div class="left"></div>
        <div class="right"></div>
    </div>

</body>

</html>
