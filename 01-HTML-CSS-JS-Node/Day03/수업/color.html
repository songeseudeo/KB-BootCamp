<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CSS 색상 실습</title>

<style>

/* =========================================
CSS 색상 실습 

https://developer.mozilla.org/en-US/docs/Web/CSS/color_value
========================================= */


/* 박스 기본 스타일 */
.box{
width:200px;
padding:20px;
margin:10px;
color:white;
font-weight:bold;
}


/* 1. HEX 색상 */
.hex6{
background:#ff0000;   /* 빨강 */
}

.hex3{
background:#f00;      /* 위와 같은 색 */
}


/* 2. RGB */
.rgb{
background:rgb(255,0,0);
}


/* 3. RGBA (투명도) */
.rgba{
background:rgba(255,0,0,0.5);
color:black;
}


/* 4. HSL */
.hsl{
background:hsl(120,100%,50%); /* 초록 */
}


/* 5. transparent */
.transparent{
background:black;
/* color:transparent; */  /*주석풀어비교하세요*/

}

</style>
</head>


<body>

<h1>CSS 색상 실습</h1>

<h2>1. HEX 색상</h2>

<div class="box hex6">#ff0000</div>
<div class="box hex3">#f00 (같은색)</div>


<h2>2. RGB</h2>

<div class="box rgb">rgb(255,0,0)</div>


<h2>3. RGBA (투명도)</h2>

<div class="box rgba">rgba(255,0,0,0.5)</div>


<h2>4. HSL</h2>

<div class="box hsl">hsl(120,100%,50%)</div>


<h2>5. transparent</h2>

<div class="box transparent">
transparent (글자가 투명)
</div>
<a href="http://www.w3schools.com/colors/colors_names.asp" target="_blank">색상명참조사이트로 이동</a>
    

</body>
</html>

/* =========================================================
CSS 색상 표현 방식 정리 


MDN Web Docs
https://developer.mozilla.org/en-US/docs/Web/CSS/color_value


========================================================= */


/* =========================================================
1. HEX 색상 (16진수 색상)

형식
#RRGGBB

RR → Red
GG → Green
BB → Blue

각 값의 범위
00 ~ FF

예

#ff0000 → 빨강
#00ff00 → 초록
#0000ff → 파랑
#000000 → 검정
#ffffff → 흰색
========================================================= */


/* =========================================================
2. HEX 3자리 vs 6자리

HEX 색상은 축약형을 사용할 수 있다.

6자리
#RRGGBB

3자리
#RGB

3자리 원리

#abc

↓

#aa bb cc

즉

#abc = #aabbcc

예

#fff = #ffffff
#000 = #000000
#f00 = #ff0000

주의

모든 색상이 축약 가능한 것은 아니다.

예

#ff0100 → 축약 불가능
========================================================= */


/* =========================================================
3. RGB 색상

형식

rgb(red, green, blue)

값 범위

0 ~ 255

예

rgb(255,0,0)   → 빨강
rgb(0,255,0)   → 초록
rgb(0,0,255)   → 파랑
rgb(0,0,0)     → 검정
rgb(255,255,255) → 흰색
========================================================= */


/* =========================================================
4. RGBA 색상

RGB + Alpha(투명도)

형식

rgba(red, green, blue, alpha)

alpha 범위

0 ~ 1

0 → 완전 투명
1 → 완전 불투명

예

rgba(255,0,0,0.5)

→ 빨간색 + 50% 투명
========================================================= */


/* =========================================================
5. HSL 색상 원리

HSL = Hue / Saturation / Lightness

형식

hsl(hue, saturation, lightness)

---------------------------------------------------------

Hue (색상)

0 ~ 360

색상 원

0   → 빨강
120 → 초록
240 → 파랑

---------------------------------------------------------

Saturation (채도)

색의 선명도

0%  → 회색
100% → 원색

---------------------------------------------------------

Lightness (명도)

밝기

0%  → 검정
50% → 기본 색
100% → 흰색

예

hsl(0,100%,50%) → 빨강
========================================================= */


/* =========================================================
6. transparent

transparent는 완전 투명한 색상

예

color: transparent;

---------------------------------------------------------

차이

transparent
→ 완전 투명

rgba(255,0,0,0.5)
→ 색상 + 투명도

즉

transparent는 색이 없는 상태
rgba는 색이 있지만 투명한 상태
========================================================= */
