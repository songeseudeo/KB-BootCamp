
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CSS Selector Examples</title>
<style>
/* ---------------- 구조 선택자 예제 ---------------- */
/* 첫 번째 자식 p */
#test1 p:first-child{
    background:red;
    color:white;
}

/* 마지막 자식 p */
#test1 p:last-child{
    background:orange;
    color:white;
}

/* 짝수 번째 자식 */
#test1 p:nth-child(2n){
    background:yellowgreen;
    color:white;
}

/* 뒤에서 두 번째 자식 */
#test1 p:nth-last-child(2){
    background:skyblue;
}

/* ---------------- 형태 선택자 예제 ---------------- */
/* 같은 타입 중 첫 번째 p */
#test2 p:first-of-type{
    background:red;
    color:white;
}

/* 같은 타입 중 마지막 p */
#test2 p:last-of-type{
    background:orange;
    color:white;
}

/* 같은 타입 중 짝수 */
/* #test2 p:nth-of-type(2n){
    background:yellowgreen;
} */

/* 뒤에서 3번째 p */
#test2 p:nth-last-of-type(3){
    background:skyblue;
}

/* ---------------- 가상요소 ---------------- */
#test3 p::first-letter{
    font-size:2em;
}

#test3 p::first-line{
    background:cyan;
}

#test3 p::before{
    content:"번호 ";
}

#test3 p::after{
    content:" ★";
}

/* ---------------- 부정 선택자 ---------------- */
#test4 p:not(:nth-child(2n-1)){
    background:orange;
}

/* ---------------- CSS Counter ---------------- */
#test5{
    counter-reset:num;
}

#test5 p{
    counter-increment:num;
}

#test5 p::before{
    content:counter(num) ". ";
}
</style>
</head>

<body>

<h2>1. 구조 선택자</h2>
<div id="test1">
<p>첫번째 p</p>
<p>두번째 p</p>
<p>세번째 p</p>
<span>span 요소</span>
</div>

<h2>2. 형태 선택자</h2>
<div id="test2">
<h3>제목</h3>
<p>첫번째 p</p>
<p>두번째 p</p>
<span>span</span>
<p>세번째 p</p>
<p>네번째 p</p>
</div>

<h2>3. 가상요소</h2>
<div id="test3">
<p>가상요소 예제 문장입니다.</p>
</div>

<h2>4. 부정 선택자</h2>
<div id="test4">
<p>1</p>
<p>2</p>
<p>3</p>
<p>4</p>
</div>

<h2>5. CSS Counter</h2>
<div id="test5">
<p>항목</p>
<p>항목</p>
<p>항목</p>
</div>

</body>
</html>

<!-- 

/* =====================================================
CSS 선택자 개념 정리
출처: MDN Web Docs / W3C Selectors Level 4
https://developer.mozilla.org/en-US/docs/Web/CSS
https://developer.mozilla.org/en-US/docs/Web/CSS/Reference/Selectors
===================================================== */


/* -------------------------------
1. 구조 선택자 (Structural Pseudo-class)
부모 요소 기준으로 "자식의 위치"를 기준으로 선택
-------------------------------- */

/* 첫번째 자식 요소 선택 */
:first-child

/* 마지막 자식 요소 선택 */
:last-child

/* n번째 자식 선택 */
:nth-child(n)

/* 뒤에서 n번째 자식 선택 */
:nth-last-child(n)

/*
예
:nth-child(2n) → 짝수
:nth-child(2n+1) → 홀수
*/


/* -------------------------------
2. 형태 구조 선택자 (Type-based selector)
같은 태그끼리만 순서를 계산
-------------------------------- */

/* 같은 태그 중 첫번째 */
:first-of-type

/* 같은 태그 중 마지막 */
:last-of-type

/* 같은 태그 중 n번째 */
:nth-of-type(n)

/* 같은 태그 중 뒤에서 n번째 */
:nth-last-of-type(n)

/*
차이점

nth-child
→ 모든 형제 요소 기준

nth-of-type
→ 같은 태그끼리만 기준
*/


/* -------------------------------
3. 가상요소 (Pseudo-elements)
요소의 특정 부분을 선택
표기 ::
-------------------------------- */

/* 첫 글자 선택 */
::first-letter

/* 첫 줄 선택 */
::first-line

/* 요소 앞에 가상요소 생성 */
::before

/* 요소 뒤에 가상요소 생성 */
::after

/*
before / after 특징

- content 속성 필수
- 기본 inline 요소
- display:block 변경 가능
*/


/* -------------------------------
4. 부정 선택자
-------------------------------- */

/* 특정 선택자를 제외 */
:not(selector)

/*
예

p:not(.active)
→ active 클래스가 아닌 p 선택
*/


/* -------------------------------
5. CSS Counter (자동 번호)
-------------------------------- */

/* 카운터 초기화 */
counter-reset

/* 카운터 증가 */
counter-increment

/* 카운터 출력 */
counter()

/*
예

counter-reset: num;

counter-increment: num;

content: counter(num);
*/ -->
