<!DOCTYPE html>
<html>

<head>

    <title>CSS3 Position Property</title>
    <style>
        .box {
            width: 100px;
            height: 100px;
            position: absolute;
        }

        .box:nth-child(1) {
            background-color: red;
            left: 10px;
            top: 10px;
            z-index: 100;  /* 가장 위에 표시 */
        }

        .box:nth-child(2) {
            background-color: green;
            left: 50px;
            top: 50px;
            z-index: 10;
        }

        .box:nth-child(3) {
            background-color: blue;
            left: 90px;
            top: 90px;
            z-index: 1;
        }

         /* body 바로 아래의 div(=부모 컨테이너) */
    body > div {
      width: 400px;
      height: 100px;
      /*  부모 높이를 100px로 고정 */
      border: 3px solid black;
      position: relative;
      /*  absolute( 자식들)의 기준점이 됨 */
      /* overflow: hidden;         => 현재는 미적용 상태  기본값은 overflow: visible */
    }
  </style>
    </style>
</head>

<body>
    <h1>Lorem ipsum dolor amet</h1>
    <div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <h1>Lorem ipsum dolor amet</h1>
</body>

</html>
<!--
z-index

겹칠 때 쌓이는 순서를 결정.

값이 클수록 위에 표시.

조건:
position이 있어야 적용됨.



기본 원리 

같은 z-index면
HTML 아래쪽 요소가 위에 표시.


z-index 순서: 숫자가클수록위 

red   → 100 (가장 위)
green → 10
blue  → 1 (가장 아래)

 빨간 박스가 항상 가장 위에 표시됨

 -->
