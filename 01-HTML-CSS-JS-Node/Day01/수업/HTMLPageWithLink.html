<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Style.css">

</head>
<body>
    <h1>Hello World..!</h1>
</body>
</html>

<!-- 외부 스타일 방식-->

<!-- 
  외부 CSS 파일 연결
  - rel="stylesheet" : 스타일시트 파일임을 명시
  - href="Style.css" : 같은 폴더에 있는 Style.css 파일 경로

  <link rel="stylesheet" href="Style.css" /> -->

 <!--
1. <link> 태그

외부 리소스를 현재 HTML 문서에 연결할 때 사용하는 태그.
주로 CSS 파일 연결에 사용한다.
일반적으로 <head> 영역에 작성한다.

기본 문법:
<link rel="stylesheet" href="파일경로">



2. rel 속성

현재 문서와 연결된 문서의 관계(Relationship)를 정의한다.
"stylesheet"는 연결 대상이 CSS 파일임을 의미한다.



3. href 속성

연결할 파일의 경로를 지정한다.
-->
