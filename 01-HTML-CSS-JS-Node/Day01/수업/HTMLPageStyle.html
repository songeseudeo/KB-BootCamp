<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 내부스타일 방식 -->
    <style> 
    h1 { 
        color: white; 
        background: black; 
    }
    h2 { 
    color: red; 
    background: black; 
    }
</style>
</head>
<body>
    <h1>Hello World..!</h1>
    <h2>Hello World..!</h2>
</body>
</html>

<!-- 1. 내부 스타일 방식 (Internal CSS)
HTML 문서 내부 <head> 태그 안에 <style> 태그를 작성하여
CSS를 적용하는 방식이다.
기본 문법:
<style>
  선택자 {
    속성: 값;
  }
</style>
특징:
- 해당 HTML 파일에만 적용된다.
- 별도의 CSS 파일이 필요 없다.
- 간단한 테스트, 실습, 소규모 페이지에 적합하다.
- 프로젝트 규모가 커지면 유지보수가 어려워진다. 

ctrl + c : 복사하기
ctrl + v : 붙여넣기
ctrl + z : 뒤로가기
ctrl + s : 저장하기

ctrl + / : 주석

alt + shift + f : 자동정렬
-->
