<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript 반복문 실습</title>
</head>

<body>

<h1>JavaScript 반복문 실습</h1>
<p>F12 → Console에서 결과 확인</p>

<script>

/*
================================
반복문 (Loop)
================================

반복문은 같은 코드를 여러 번 실행할 때 사용하는 문장이다.


대표 반복문

1. for
2. while
3. do...while
4. for...of
5. for...in

MDN 출처
https://developer.mozilla.org/ko/docs/Web/JavaScript/Guide/Loops_and_iteration
*/


/*
================================
1. for 반복문
================================

반복 횟수가 정해져 있을 때 가장 많이 사용한다.

문법

for (초기값; 조건식; 증감식) {
    실행문
}

동작 순서

1. 초기값 실행
2. 조건 검사
3. 코드 실행
4. 증감 실행
5. 다시 조건 검사

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/for
*/

for (let i = 1; i <= 5; i++) {
    console.log("for 반복:", i);
}


/*
================================
for 반복문 예제
1~10 합 구하기
================================
*/

let sum = 0;

for(let i=1; i <=10; i++) {
    sem = sem + i ; // 0+1
}
console.log(sum);

/*
================================
2. while 반복문
================================

조건이 true인 동안
코드를 계속 반복한다.

문법

while (조건식) {
    실행문
}

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/while
*/

let num = 1;
while (num <=5){
    console.log("while 반복", num);
    num++;
}

/*
================================
3. do...while 반복문
================================

조건을 검사하기 전에
코드를 먼저 실행한다.

따라서 최소 1번은 실행된다.

문법

do {
    실행문
} while (조건);

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/do...while
*/

num = 1;
do {
    console.log("do while 반복:", num);
    num++;
} while (num <=5);

/*
================================
4. 배열 반복 (for...of)
================================

배열의 값을 하나씩 반복한다.

문법

for (변수 of 배열) {
    실행문
}

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/for...of
*/

let fruits = ["apple", "banana", "orange"];

for (let fruit of fruits) {
    console.log("fruit:", fruit);
}


/*
================================
5. 객체 반복 (for...in)
================================

객체(object)의 속성(key)을 반복한다.

문법

for (변수 in 객체) {
    실행문
}

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/for...in
*/

let user = {
    name: "홍길동",
    age: 20,
    city: "서울"
};

for (let key in user) {
    console.log(key, user[key]);
}


/*
================================
6. break
================================

반복문을 즉시 종료한다.

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/break
*/

for (let i = 1; i <= 10; i++) {

    if (i === 5) {
        break;
    }

    console.log("break 예제:", i);
}


/*
================================
7. continue
================================

현재 반복을 건너뛰고
다음 반복으로 이동한다.

MDN
https://developer.mozilla.org/ko/docs/Web/JavaScript/Reference/Statements/continue
*/

for (let i = 1; i <= 10; i++) {

    if (i % 2 === 0) { // 짝수
        continue;
    }

    console.log("홀수:", i);
}


//20은 건너띄고  40에 멈추자 출력하지말고

let arr = [10, 20, 30, 40];

for (let num of arr) {



    console.log(num);
}


let user2 = {
    name: "홍길동",
    age: 20,
    city: "서울"
};

//age 출력은 하지말자
for (let key in user2) {



    console.log(key, user2[key]);
}
/*
================================
8. 중첩 반복문
================================

반복문 안에 반복문을 넣는 방식

구구단 예제
*/
// ------ 2 단 ------
//  2 x 1 = 2
//  2 x 2 = 4
//  2 x 3 = 6
//  2 x 4 = 8
//  2 x 5 = 10
//  2 x 6 = 12
//  2 x 7 = 14
//  2 x 8 = 16
//  2 x 9 = 18
let i = 2;
console.log("------", i, "단 ------");

for (let j = 1; j <= 9; j++) {
    console.log(i + " x " + j + " = " + (i * j));
}

console.log("*********************");


for (let i = 2; i <= 9; i++) {

    console.log("------", i, "단 ------");

    for (let j = 1; j <= 9; j++) {
        console.log(i + " x " + j + " = " + (i * j));
    }
}


/*
================================
9. 반복문 사용 시 주의
================================

1. 조건이 false가 되는지 확인 (반복문을 빠져나갈수 있게)
2. 증감식 작성
3. 무한 반복 방지

예

while(true){
   console.log("무한 반복");
}
*/


/*
================================
10. 반복문 비교
================================

for
→ 반복 횟수가 정해져 있을 때

while
→ 조건 중심 반복

do while
→ 최소 1번 실행 해야할때

for...of
→ 배열 반복

for...in
→ 객체 반복
*/




</script>

</body>
</html>
