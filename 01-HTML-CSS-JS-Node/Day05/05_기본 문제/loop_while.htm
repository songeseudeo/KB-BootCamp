<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let data = [10, 20, 30, 40];
        console.log("배열의 길이: ", data);
        // while문을 위한 인덱스 변수 미리 선언
        // data.length : 배열 안에 데이터가 몇 개 들어있는지 알려주는 속성.
        let i = 0;
        while (i < data.length) {
            alert(data[i]);
            i++; //중요: 이 부분을 빠뜨리면 무한 루프에 빠짐
        }
        // 아래 for문이랑 비교
        // for (let i = 0; i < data.length; i++) {
        //     alert(data[i])
        // }
    </script>
</body>
</html>
