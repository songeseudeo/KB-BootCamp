<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>Vue 생명주기 HTML 예제</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.8;
    }

    .box {
      border: 1px solid #ccc;
      padding: 16px;
      margin-bottom: 16px;
    }

    .result {
      background: #f7f7f7;
      padding: 10px;
      margin-top: 10px;
    }

    input {
      padding: 6px;
      width: 250px;
    }

    button {
      padding: 6px 10px;
      margin-left: 8px;
    }

    ul {
      padding-left: 18px;
    }
  </style>
</head>

<body>

  <!-- 루트 앱 영역 -->
  <div id="app">

    <!-- v-if로 컴포넌트 생성/제거 → 생명주기 확인 가능 -->
    <user-list v-if="visible"></user-list>

    <!-- 버튼 클릭 시 컴포넌트 제거/재생성 -->
    <button @click="visible = !visible">
      {{ visible ? '컴포넌트 제거' : '컴포넌트 다시 표시' }}
    </button>
  </div>

  <!-- 
    컴포넌트 템플릿
    - HTML 안에서 Vue 컴포넌트를 정의하는 방식
  -->
  <script type="text/x-template" id="user-list-template">
    <div class="box">
      <h1>사용자 검색</h1>

      <!-- 입력값은 keyword와 양방향 바인딩 
      ref 속성을 HTML(또는 컴포넌트)에 지정하면
      해당 요소를 this.$refs를 통해 접근할 수 있음 
      -->
      검색어:
      <input
        ref="keywordInput" 
        type="text"
        v-model="keyword"
        placeholder="이름 검색"
      />

      <!-- 버튼 클릭 → API 다시 호출 -->
      <button @click="refreshUsers">새로고침</button>

      <div class="result">
        <div>전체 사용자 수: {{ users.length }}</div>
        <div>검색 결과 수: {{ filteredUsers.length }}</div>
        <div>현재 검색어: {{ keyword }}</div>
      </div>

      <!-- 필터된 사용자 목록 출력 -->
      <ul>
        <li v-for="user in filteredUsers" :key="user.id">
          {{ user.name }} / {{ user.email }}
        </li>
      </ul>
    </div>
  </script>

  <!-- Vue CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <script>
    /*
    ==================================================
    루트 앱 생성
    - 전체 앱의 최상위 영역
    ==================================================
    */
    const app = Vue.createApp({
      data() {
        return {
          visible: true   // 컴포넌트 표시 여부
        };
      }
    });

    /*
    ==================================================
    컴포넌트 정의
    ==================================================
    */
    app.component('user-list', {
      template: '#user-list-template',
      // 'user-list' : 컴포넌트 등록 이름
      // '#user-list-template' : 화면에 보여줄 HTML 템플릿

      data() {
        return {
          users: [],     // 사용자 목록
          keyword: ''    // 검색어
        };
      },

      /*
      ==================================================
      계산 속성 (computed)
      - 데이터 기반 자동 계산
      ==================================================
      */
      computed: {
        filteredUsers() {
          const kw = this.keyword.trim().toLowerCase();

          if (!kw) return this.users;

          return this.users.filter(user =>
            user.name.toLowerCase().includes(kw)
          );
        }
      },

      /*
      ==================================================
      메서드
      ==================================================
      */
      methods: {
        // API 호출 → 사용자 데이터 가져오기
        async fetchUsers() {
          console.log('fetchUsers() 실행');

          try {
            const response = await fetch('https://jsonplaceholder.typicode.com/users');
            const data = await response.json();
            this.users = data;
          } catch (error) {
            console.error('사용자 목록 조회 실패:', error);
          }
        },

        // 버튼 클릭 시 다시 조회
        async refreshUsers() {
          console.log('새로고침 버튼 클릭');
          await this.fetchUsers();
        }
      },

      /*
      ==================================================
      생명주기 (Lifecycle Hooks)
      ==================================================
      */

      // 1. 가장 처음 실행
      // 아직 data, methods 사용 전
      beforeCreate() {
        console.log('1. beforeCreate');
      },

      // 2. data, methods 사용 가능
      // 초기 데이터 처리에 자주 사용
      created() {
        console.log('2. created');
        this.fetchUsers();
      },

      // 3. DOM이 화면에 붙기 직전
      beforeMount() {
        console.log('3. beforeMount');
      },

      // 4. DOM 연결 완료
      // DOM을 직접 다룰 수 있는 시점 - 이벤트연결, 외부 라이브러리 연결 
      mounted() {
        console.log('4. mounted');

        // input 자동 포커스
        this.$refs.keywordInput.focus();
      },

      // 5. 데이터 변경 → 화면 갱신 직전(DOM 반영 직전)
      beforeUpdate() {
        console.log('5. beforeUpdate');
      },

      // 6. 화면 갱신 완료(DOM 반영 직전)
      updated() {
        console.log('6. updated');
      },

      // 7. 컴포넌트 제거 직전
      beforeUnmount() {
        console.log('7. beforeUnmount');
      },

      // 8. 컴포넌트 제거 완료
      // 이벤트 제거, 타이머 해제 등을 처리
      unmounted() {
        console.log('8. unmounted');
      }
    });

    // 앱 시작
    app.mount('#app');
  </script>
</body>

</html>
