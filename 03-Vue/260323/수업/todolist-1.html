<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>06-11</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }

      .title {
        text-align: center;
        font-weight: bold;
        font-size: 20pt;
      }

      .todo-done {
        text-decoration: line-through;
      }

      .container {
        padding: 10px 10px 10px 10px;
      }

      .panel -borderless {
        border: 0;
        box-shadow: none;
      }

      .pointer {
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div id="app" class="container">
    <div class="card card-body bg-light">
        <div class="title">:: Todolist App</div>
    </div>

    <div class="card card-default card-borderless">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col">
                    <div class="input-group">
                        <input type="text" id="msg" class="form-control" name="msg" 
                               placeholder="할일을 여기에 입력하세요!!" v-model="todo" 
                               @keyup.enter="addTodo" />
                        <span class="btn btn-primary input-group-addon" @click="addTodo">추가</span>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <ul class="list-group">
                        <li v-for="todoitem in todolist" :key="todoitem.id" class="list-group-item"
                            :class="{ 'list-group-item-success': todoitem.completed }" 
                            @click="toggleCompleted(todoitem.id)">
                            <span class="pointer" :class="{ 'todo-done': todoitem.completed }">
                                {{ todoitem.todo }} {{ todoitem.completed ? "(완료)" : "" }}
                            </span>
                            <span class="float-end badge bg-secondary pointer" 
                                  @click.stop="deleteTodo(todoitem.id)">삭제</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="https://unpkg.com/vue"></script>
    <script type="text/javascript">
      //할일 아이디 유니크(중복X)하고 반드시 쓰기 위해 시각을 구해줌.
      var ts = new Date().getTime();
      //   console.log(ts);
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            //입력한 할 일 저장할 곳
            todo: '',
            //할일을 하나 쓰면 todolist맽끝에 객체리터럴이 붙을 것임.
            //삭제하면 todolist에서 삭제됨.
            //완료되었을 때 해당 id의 completed속성값을 true로 변경됨.
            todolist: [
              { id: ts, todo: '자전거 타기', completed: false },
              { id: ts + 1, todo: '딸과 공원 산책', completed: true },
              { id: ts + 2, todo: '일요일 애견 카페', completed: false },
              { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
            ],
          };
        },
        methods: {
          // 입력한 값 model에 넣어서 [] 맨끝에 넣자.(push)
          addTodo() {
            if (this.todo.length >= 2) {
              this.todolist.push({
                id: new Date().getTime(),
                todo: this.todo,
                completed: false,
              });
              this.todo = '';
            }
          },
          // 삭제버튼 누른 항목 제거, 선택한 버튼의 id로 삭제 처리
          deleteTodo(id) {
            //위치를 찾아서
            let index = this.todolist.findIndex((item) => id == item.id);
            //배열에서 지우자. splice이용
            this.todolist.splice(index, 1);
          },
          // 클릭하면 취소선 스타일 지정되고, 배경색을 변경하는 스타일 지정
          // 선택한 항목의 id로 찾아서 스타일 지정
          toggleCompleted(id) {
            let index = this.todolist.findIndex((item) => id == item.id);
            this.todolist[index].completed = !this.todolist[index].complete;
            //arr[0]
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
